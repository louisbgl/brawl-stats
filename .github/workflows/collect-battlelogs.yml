name: Collect Battle Logs

on:
  # Run every hour
  schedule:
    - cron: '0 * * * *'

  # Allow manual trigger
  workflow_dispatch:

  # Run on push to main (for testing)
  push:
    branches:
      - main
    paths:
      - 'collect_battlelogs.py'
      - 'src/battle_store.py'
      - 'src/battle_models.py'
      - '.github/workflows/collect-battlelogs.yml'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow pushing commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Collect battle logs
        env:
          BRAWL_STARS_PROXY_URL: ${{ secrets.BRAWL_STARS_PROXY_URL }}
        run: uv run collect_battlelogs.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/battlelogs/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Hourly battlelog update: $(date +'%Y-%m-%d %H:00 UTC')"
            git push || (git pull --rebase origin main && git push)
          fi
